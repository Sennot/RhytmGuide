name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mod
        id: build
        uses: geode-sdk/build-geode-mod@main

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: RhytmGuide.geode
          path: ${{ steps.build.outputs.build-output }}
