name: Build Geode Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .geode
    runs-on: windows-latest

    steps:
      - name: Checkout mod
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode@v1

      - name: Print Geode environment
        shell: pwsh
        run: |
          Write-Host "GEODE_SDK=$env:GEODE_SDK"
          geode --version

      - name: Install Geode loader binaries
        shell: pwsh
        run: |
          geode sdk install-binaries

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config RelWithDebInfo --parallel

      - name: Find .geode
        id: find_geode
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path build -Recurse -Filter *.geode

          if ($files.Count -eq 0) {
            Write-Error "No .geode file found"
            exit 1
          }

          $file = $files[0].Full